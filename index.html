<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sayıyı Bil</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #000;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      width: 90%;
      max-width: 500px;
    }

    .title {
      font-size: 64px;
      font-weight: bold;
      color: gray;
      margin-bottom: 12px;
    }

    .streaks {
      font-size: 16px;
      color: #bbb;
      margin-bottom: 35px;
      line-height: 1.8;
    }

    .input-group {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }

    input[type="number"] {
      width: 180px;
      padding: 14px;
      font-size: 20px;
      border: 2px solid #444;
      border-radius: 10px;
      background: #111;
      color: white;
      text-align: center;
      outline: none;
    }

    input[type="number"]:focus {
      border-color: #888;
    }

    button {
      padding: 14px 24px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      background: #222;
      color: white;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      background: #333;
      transform: scale(1.03);
    }

    .result {
      margin-top: 20px;
      font-size: 28px;
      font-weight: bold;
      min-height: 40px;
    }

    .win {
      color: #00ff88;
    }

    .lose {
      color: #ff4444;
    }

    .info {
      margin-top: 15px;
      font-size: 18px;
      color: #999;
      min-height: 25px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">Sayıyı Bil</div>

    <div class="streaks">
      <div>Bilme Streak: <span id="winStreak">0</span></div>
      <div>Bilememe Streak: <span id="loseStreak">0</span></div>
    </div>

    <div class="input-group">
      <input type="number" id="guessInput" min="0" max="100" placeholder="0 - 100" />
      <button onclick="checkGuess()">Tahmin Et</button>
    </div>

    <div id="result" class="result"></div>
    <div id="info" class="info"></div>
  </div>

  <script>
    let winStreak = 0;
    let loseStreak = 0;

    function generateNumber() {
      return Math.floor(Math.random() * 101); // 0-100 dahil
    }

    function checkGuess() {
      const input = document.getElementById("guessInput");
      const result = document.getElementById("result");
      const info = document.getElementById("info");

      const guess = Number(input.value);

      if (input.value === "" || guess < 0 || guess > 100) {
        result.textContent = "0 ile 100 arasında bir sayı gir!";
        result.className = "result lose";
        info.textContent = "";
        return;
      }

      const randomNumber = generateNumber();

      if (guess === randomNumber) {
        winStreak++;
        loseStreak = 0;

        result.textContent = "KAZANDIN!";
        result.className = "result win";
        info.textContent = `Doğru sayı: ${randomNumber}`;
      } else {
        loseStreak++;
        winStreak = 0;

        result.textContent = "KAYBETTİN!";
        result.className = "result lose";
        info.textContent = `Doğru sayı: ${randomNumber}`;
      }

      document.getElementById("winStreak").textContent = winStreak;
      document.getElementById("loseStreak").textContent = loseStreak;

      input.value = "";
      input.focus();
    }

    document.getElementById("guessInput").addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        checkGuess();
      }
    });
  </script>
</body>
</html>
